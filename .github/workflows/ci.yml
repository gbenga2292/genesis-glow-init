name: 🔍 CI — Type Check & Lint

# Runs on every push to develop branch AND on PRs targeting main
# This catches bugs before they ever reach production
on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  check:
    name: TypeScript & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
